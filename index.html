<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTIS Survey v0.7</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>BTIS Survey</h1>
      <p>Botswana Tourism Improvement System — Version 0.7</p>
    </div>
    <div class="top-actions">
      <button id="newSurveyBtn" class="secondary">New Survey</button>
      <button id="dashboardBtn" class="secondary">Dashboard</button>
    </div>
  </header>

  <main>
    <section id="surveyView">
      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="screenLabel">Screen 1 of 30</span>
          <span id="progressText">3%</span>
        </div>
        <div class="progress-track"><div id="progressBar"></div></div>
      </div>

      <form id="surveyForm">
        <div id="screenContainer"></div>

        <div class="nav-row">
          <button type="button" id="prevBtn" class="secondary">← Previous</button>
          <button type="button" id="saveDraftBtn" class="secondary">Save Draft</button>
          <button type="button" id="nextBtn">Next →</button>
          <button type="submit" id="submitBtn" class="hidden">Submit Survey</button>
        </div>
      </form>
    </section>

    <section id="dashboardView" class="hidden">
      <div class="panel">
        <div class="panel-head">
          <div>
            <h2>BTIS Dashboard</h2>
            <p>Data is stored only in this browser.</p>
          </div>
          <button id="adminToggle" class="secondary">Admin Mode</button>
        </div>

        <div class="filters">
          <input id="filterGuide" placeholder="Guide" />
          <input id="filterAccommodation" placeholder="Accommodation" />
          <input id="filterNationality" placeholder="Nationality" />
          <button id="clearFilters" class="secondary">Clear</button>
        </div>

        <div class="stats">
          <div><strong id="statCount">0</strong><span>Total Surveys</span></div>
          <div><strong id="statAverage">-</strong><span>Average Score</span></div>
          <div><strong id="statLatest">-</strong><span>Latest Survey</span></div>
        </div>

        <div class="export-row">
          <button id="exportCsv" class="secondary">Export CSV</button>
          <button id="exportJson" class="secondary">Export JSON</button>
          <button id="deleteAll" class="danger hidden admin-only">Delete All Data</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Traveller</th><th>Nationality</th><th>Guide</th>
                <th>Accommodation</th><th>Overall</th><th class="admin-only hidden">Action</th>
              </tr>
            </thead>
            <tbody id="surveyTable"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <template id="privacyTemplate">
    <div class="privacy-banner">
      <strong>Privacy Mode</strong>
      <p>Please complete this section yourself. Your guide cannot see or change your answers.</p>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
